# Graph Metadata Search: Neo4j + MCP (постоянный) + одноразовая загрузка расширения (profile load-extension)
# Документация: https://docs.onerpa.ru/mcp-servery-1c/servery/graph-metadata-search

x-mcp-common-env: &mcp-common-env
  LICENSE_KEY: ${LICENSE_KEY}
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
  NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
  METADATA_DIRECTORY: /app/metadata
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
  CALCULATE_BUSINESS_INFO: ${CALCULATE_BUSINESS_INFO:-false}
  OPENAI_EMBEDDING_API_KEY: ${OPENAI_EMBEDDING_API_KEY:-${OPENAI_API_KEY}}
  OPENAI_EMBEDDING_API_BASE: ${OPENAI_EMBEDDING_API_BASE:-${OPENAI_API_BASE:-https://api.openai.com/v1}}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-ada-002}
  OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.1}
  OPENAI_MAX_COMPLETION_TOKENS: ${OPENAI_MAX_COMPLETION_TOKENS:-2000}
  SUMMARIZE: ${SUMMARIZE:-false}
  DEBUG: ${DEBUG:-false}
  ENABLE_BUSINESS_SEARCH: ${ENABLE_BUSINESS_SEARCH:-true}
  AUTO_UPDATE_ON_STARTUP: ${AUTO_UPDATE_ON_STARTUP:-true}
  ASYNC_VECTOR_INDEXING: ${ASYNC_VECTOR_INDEXING:-true}
  ENABLE_METADATA_DESCRIPTION_EMBEDDING: ${ENABLE_METADATA_DESCRIPTION_EMBEDDING:-true}
  ENABLE_CODE_SEARCH: ${ENABLE_CODE_SEARCH:-true}
  BACKGROUND_POST_INDEXING: ${BACKGROUND_POST_INDEXING:-true}
  TEMPLATE_MODE_ENABLED: ${TEMPLATE_MODE_ENABLED:-true}
  TEMPLATE_MODE_ONLY: ${TEMPLATE_MODE_ONLY:-false}
  LOAD_BSL_SIGNATURES: ${LOAD_BSL_SIGNATURES:-true}
  ENABLE_ROUTINE_EMBEDDINGS: ${ENABLE_ROUTINE_EMBEDDINGS:-true}
  LOAD_FORMS_FROM_XML: ${LOAD_FORMS_FROM_XML:-false}
  LOAD_EVENT_SUBSCRIPTIONS: ${LOAD_EVENT_SUBSCRIPTIONS:-false}
  LOAD_PREDEFINED_VALUES: ${LOAD_PREDEFINED_VALUES:-false}
  LOAD_ROLE_RIGHTS: ${LOAD_ROLE_RIGHTS:-false}
  LOAD_HELP_FROM_HTML: ${LOAD_HELP_FROM_HTML:-false}
  EMBEDDING_ALLOW_OFFLINE_FALLBACK: ${EMBEDDING_ALLOW_OFFLINE_FALLBACK:-true}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
  INDEX_BATCH_SIZE: ${INDEX_BATCH_SIZE:-50}
  MAX_TOKENS_PER_BATCH: ${MAX_TOKENS_PER_BATCH:-7500}
  BUSINESS_INFO_MAX_TOKENS: ${BUSINESS_INFO_MAX_TOKENS:-4000}
  BUSINESS_INFO_RETRY_COUNT: ${BUSINESS_INFO_RETRY_COUNT:-3}

services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password123}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1536m
      - NEO4J_server_memory_pagecache_size=1g
    volumes:
      # Персистентное хранилище графа (не теряется при docker-compose down)
      - ${NEO4J_DATA_PATH:-./data/neo4j}:/data
    deploy:
      resources:
        limits:
          memory: 3G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 120s
      timeout: 60s
      retries: 10
      start_period: 60s

  mcp-app:
    image: comol/1c_graph_metadata:${IMAGE_TAG:-latest}
    container_name: 1c_graph_metadata
    restart: unless-stopped
    ports:
      - "8006:8006"
    volumes:
      - ${METADATA_HOST_PATH:-./data/metadata_placeholder}:/app/metadata:ro
      - ${METADATA_FILES_HOST_PATH:-./data/metadata_files_placeholder}:/app/metadata_files:ro
    environment:
      <<: *mcp-common-env
      METADATA_FILES: ${METADATA_FILES_HOST_PATH:+/app/metadata_files}
      CODE_EXPORT_PATH: ${METADATA_FILES_HOST_PATH:+/app/metadata_files}
      MCP_USE_SSE: ${MCP_USE_SSE:-false}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8006}
      MCP_PATH: ${MCP_PATH:-/mcp}
      RESET_DATABASE: ${RESET_DATABASE:-false}
      FULL_METADATA_RELOAD: ${FULL_METADATA_RELOAD:-false}
      PROJECT_NAME: ${PROJECT_NAME:-1C Metadata Project}
      EXTENSION_NAME: ${EXTENSION_NAME:-}
      EXTENSION_BASE_PROJECT: ${EXTENSION_BASE_PROJECT:-}
    deploy:
      resources:
        limits:
          memory: 4G
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/search"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s

  # Одноразовая загрузка расширения в ту же Neo4j (после загрузки базы):
  #   copy extension.env.example extension.env  → заполнить пути
  #   .\load-extension.ps1
  mcp-extension-loader:
    profiles: ["load-extension"]
    image: comol/1c_graph_metadata:${IMAGE_TAG:-latest}
    container_name: 1c_graph_extension_loader
    restart: "no"
    volumes:
      - ${EXTENSION_METADATA_HOST_PATH:-./data/extension_metadata_placeholder}:/app/metadata:ro
      - ${EXTENSION_METADATA_FILES_HOST_PATH:-./data/extension_files_placeholder}:/app/metadata_files:ro
    environment:
      <<: *mcp-common-env
      METADATA_FILES: /app/metadata_files
      CODE_EXPORT_PATH: /app/metadata_files
      RESET_DATABASE: ${EXTENSION_RESET_DATABASE:-true}
      FULL_METADATA_RELOAD: ${EXTENSION_FULL_METADATA_RELOAD:-false}
      PROJECT_NAME: ${EXTENSION_BASE_PROJECT}
      EXTENSION_NAME: ${EXTENSION_NAME}
      EXTENSION_BASE_PROJECT: ${EXTENSION_BASE_PROJECT}
    depends_on:
      neo4j:
        condition: service_healthy
