<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 257 512" width="257" height="512">
  <title>Postal index digit cell</title>
  <desc>Single-digit template for Russian postal index</desc>
  <g fill="none" stroke="#000000" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <!-- outer frame -->
    <rect x="1.5" y="1.5" width="254" height="509"/>
    <!-- middle horizontal -->
    <line x1="1.5" y1="256" x2="255.5" y2="256"/>
    <!-- top half: X between top edge and middle line -->
    <line x1="1.5" y1="1.5" x2="255.5" y2="256"/>
    <line x1="255.5" y1="1.5" x2="1.5" y2="256"/>
    <!-- bottom half: X between middle line and bottom edge -->
    <line x1="1.5" y1="256" x2="255.5" y2="510.5"/>
    <line x1="255.5" y1="256" x2="1.5" y2="510.5"/>
  </g>
</svg>
