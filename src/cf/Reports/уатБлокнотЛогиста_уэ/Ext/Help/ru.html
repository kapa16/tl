<h1 style="font-size: 17.920000076293945px;"><font color="#000080">Отчет "Блокнот логиста"</font></h1>
<p class="Usual">Данный отчет отображает сведения по предварительным Потребностям в перевозке.</p>
<p class="Usual">Для варианта отчета "Блокнот логиста с группировками" сведения выводятся с учетом группировок по дате и статусу документа.</p>
<p class="Usual">Относится к подсистеме <a href="Subsystem.уатЛогистика_уэ/Help">"Логистика"</a>.</p>
