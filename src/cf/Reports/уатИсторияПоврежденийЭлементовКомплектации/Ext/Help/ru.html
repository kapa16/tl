<p class="Usual">Данный отчет отображает повреждения элементов комплектации по данным документов <a href="Document.уатАктПриемаПередачиТС/Help">Акт приема-передачи ТС</a>, <a href="Document.уатРемонтныйЛист/Help">Ремонтный лист</a>.<br>Выводится характер повреждений, документ осмотра и ответственные сотрудники.</p>
<p class="Usual">Относится к подсистеме <a href="Subsystem.уатБДД/Help">"БДД"</a>.</p>
