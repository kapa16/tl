<h1><font color="#000080">Отчет "Ошибки в учете шин"</font></h1>
<h2>Назначение</h2>
<p class="Usual">Отчет отображает шины, по которым в результате проведения <a href="Document.уатАктПриемаПередачиТС/Help">Актов приема-передачи ТС</a> выявлено отсутствие шин (установлено состояние "Снято"), и наличие <a href="Document.уатПутевойЛист/Help">Путевых листов</a> по соответствующим ТС, введенных после таких актов.<br></p>
<p class="Usual">Относится к подсистеме <a href="Subsystem.уатБДД/Help">"БДД"</a>.</p>
