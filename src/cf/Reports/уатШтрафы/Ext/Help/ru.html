<h2 style="font-size: 15.680000305175781px;">Назначение</h2>
<h1>
</h1><p class="Usual" style="font-size: 11.199999809265137px; font-weight: normal;">Данный отчет отображает информацию по штрафам водителей за нарушение ПДД.</p>
<p class="Usual" style="font-size: 11.199999809265137px; font-weight: normal;">Относится к подсистеме <font color="#0066cc"><a href="Subsystem.уатБДД/Help">"БДД"</a></font>.</p>
<p style="font-size: 11.199999809265137px; font-weight: normal;"></p>
<h2 style="font-size: 15.680000305175781px;">Способ вызова</h2>
<h1>
</h1><p class="Usual" style="font-size: 11.199999809265137px; font-weight: normal;">Вызывается из раздела <font color="#800000">"БДД / Отчеты / Штрафы".</font></p></body></html>
