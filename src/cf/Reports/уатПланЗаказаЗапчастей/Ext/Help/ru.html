<h1><font color="#000080">Отчет "Заказы запчастей поставщикам планируемые"</font></h1>
<h2 style="font-size: 15.680000305175781px;">Назначение</h2>
<p class="Usual">Отчет предназначен для анализа потребности в запчастях за определенный период. Отчет строится по данным регистра <a href="AccumulationRegister.уатПланРаботыТС/Help">План работы ТС</a>, т.е. по документам <a href="Document.уатПланированиеРаботыТС/Help">Планирование работы ТС</a></p>
<p></p>
<p class="Usual">Относится к подсистеме <a href="Subsystem.уатТранспорт.Subsystem.уатПланированиеТС/Help">"Транспорт / Планирование"</a>.</p>
