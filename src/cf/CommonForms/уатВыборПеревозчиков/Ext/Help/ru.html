<h1 align="justify" style="font-size: 17.920000076293945px;">Общая форма "Выбор перевозчиков"</h1>
<p class="Usual">Форма предназначена для выбора привлеченных перевозчиков в документе "Тендер".</p>
<p class="Usual">Происходит автоматическое построение списка предлагаемых перевозчиков с учетом введенных в системе <a href="Document.уатПланированиеРаботыТС/Help">планов по объемам перевозок</a> по <a href="Document.уатМаршрутныйЛист/Help">Маршрутным листам</a>, которые участвуют в Тендерах.</p>
