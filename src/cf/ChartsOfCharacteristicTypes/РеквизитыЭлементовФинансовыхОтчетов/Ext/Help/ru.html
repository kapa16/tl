<h1><font color="#000080">План видов характеристик "Реквизиты элементов финансовых отчетов"</font></h1>
<h3>Назначение</h3>
<p class="Usual">План видов характеристик предназначен для хранения реквизитов элементов финансовых отчетов для построения бюджета организации, при план-фактном анализе в бюджетировании и т.п.</p>
<p class="Usual">Относится к подсистеме: <a href="Subsystem.Бюджетирование/Help"><font color="#0066cc">«Бюджетирование»</font></a>.</p></body></html>
