<h3 style="font-size: 13.4399995803833px;">Назначение</h3>
<h1>
</h1><p class="Usual" style="font-size: 11.199999809265137px; font-weight: normal;">Справочник содержит список характеров нарушений ПДД. Данные справочника используют при заполнении документа <a href="Document.уатШтраф/Help"><font color="#0066cc">"Штраф"</font></a>.</p>
<p class="Usual" style="font-size: 11.199999809265137px; font-weight: normal;">Относится к подсистеме <font color="#0066cc"><a href="Subsystem.уатБДД/Help">"БДД"</a></font>.</p>
<p style="font-size: 11.199999809265137px; font-weight: normal;"></p>
<h3 style="font-size: 13.4399995803833px;">Способ вызова</h3>
<h1>
</h1><p class="Usual" style="font-size: 11.199999809265137px; font-weight: normal;">Вызывается из раздела <font color="#800000">"БДД / Штрафы / Характеры нарушений ПДД".</font></p></body></html>
