<p>Содержит общую информацию о геозонах и предназначен для добавления новых геозон.</p>
<h3>Добавление геозоны из классификатора в список геозон</h3>
<ul><li>
<div>Выделите геозону, нажмите кнопку <strong>Выбрать</strong>.</div>
</li>
<li>
<div>Воспользуйтесь двойным щелчком мыши по строке для добавления геозоны в список геозон.</div></li></ul></body></html>
