<h3 style="font-size: 13.4399995803833px;">Назначение</h3>
<h1>
</h1><p class="Usual" style="font-size: 11.199999809265137px; font-weight: normal;">Справочник содержит список причин дорожно-транспортных происшествий. Данные справочника используют при заполнении документа <a href="Document.уатДТП/Help">"Дорожно-транспортное происшествие"</a> и формировании соответствующих отчетов по ДТП.</p>
<p class="Usual" style="font-size: 11.199999809265137px; font-weight: normal;">Относится к подсистеме <a href="Subsystem.уатБДД/Help">"БДД"</a>.</p>
